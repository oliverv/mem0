# Local dev compose — builds API and UI from source
# Copy .env.example to .env and fill in your provider vars before running.
services:
  mem0_store:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/mem0/storage

  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${PG_USER:-mem0}
      - POSTGRES_PASSWORD=${PG_PASSWORD:-mem0}
      - POSTGRES_DB=${PG_DB:-mem0}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-mem0} -d ${PG_DB:-mem0}"]
      interval: 5s
      timeout: 5s
      retries: 10

  openmemory-mcp:
    build:
      context: ..
      dockerfile: openmemory/api/dev.Dockerfile
    env_file:
      - .env
    environment:
      # Always hard-wire internal service addresses
      - QDRANT_HOST=mem0_store
      - QDRANT_PORT=6333
      - PG_HOST=postgres
      - PG_PORT=5432
    depends_on:
      - mem0_store
      - postgres
    ports:
      - "8765:8765"
    volumes:
      - openmemory_db:/usr/src/openmemory

  openmemory-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8765}
      - NEXT_PUBLIC_USER_ID=${NEXT_PUBLIC_USER_ID:-${USER:-default_user}}
    depends_on:
      - openmemory-mcp
    ports:
      - "${FRONTEND_PORT:-3001}:3000"

volumes:
  qdrant_data:
  pg_data:
  openmemory_db:
